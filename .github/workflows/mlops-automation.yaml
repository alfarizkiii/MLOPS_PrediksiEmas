name: MLOps Automation Pipeline

# Pemicu (Trigger)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3

    - name: 2. Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest mlflow scikit-learn pandas dvc

    - name: 4. Tahap 1 - Automated Testing
      run: |
        pytest tests/

    - name: 5. Tahap 2, 3, & 4 - Auto-Train & Auto-Registry
      run: |
        # Menjalankan tracking server MLflow lokal di background server GitHub
        mlflow server --host 127.0.0.1 --port 5000 &
        sleep 5 # Menunggu server menyala
        
        # Simulasi penarikan data DVC (jika ada file lokal)
        dvc pull || echo "DVC Pull diabaikan di CI environment"
        
        # Memicu pelatihan ulang model
        python src/train.py --n_estimators 60 --max_depth 6
      env:
        # Mengarahkan log MLflow ke server yang berjalan di background
        MLFLOW_TRACKING_URI: http://127.0.0.1:5000