services:
  # 1. Database Service untuk MLflow Backend Store
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow_user} -d ${POSTGRES_DB:-mlflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. MLflow Tracking Server
  mlflow-server:
    build: 
      context: .
      dockerfile: docker/mlflow.Dockerfile
    container_name: mlflow-tracking-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-dummy}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-dummy}
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow_user}:${POSTGRES_PASSWORD:-mlflow_password}@db:5432/${POSTGRES_DB:-mlflow_db}
      --artifacts-destination /mlartifacts
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
    volumes:
      - mlartifacts_data:/mlartifacts
    networks:
      - mlops-network
    depends_on:
      db:
        condition: service_healthy

  # 3. Layanan Inferensi API (FastAPI)
  api-service:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: gold-prediction-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MODEL_NAME=Gold_Price_Predictor
      - MODEL_STAGE=Production
    networks:
      - mlops-network
    depends_on:
      - mlflow-server

networks:
  mlops-network:
    driver: bridge

volumes:
  postgres_data:
  mlartifacts_data: